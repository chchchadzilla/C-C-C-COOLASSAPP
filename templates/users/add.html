{% extends "base.html" %}
{% block title %}Add Team Member — C-C-C-COOLASSAPP{% endblock %}

{% block content %}
<div class="page-header">
    <h1>➕ Add Team Member</h1>
</div>

<div class="form-container">
    <form method="POST" action="{{ url_for('users.add_user') }}">
        <div class="form-group">
            <label for="display_name">Display Name</label>
            <input type="text" id="display_name" name="display_name" required>
        </div>
        <div class="form-group">
            <label for="username">Username</label>
            <input type="text" id="username" name="username" required>
        </div>
        <div class="form-group">
            <label for="email">Email</label>
            <input type="email" id="email" name="email" required>
        </div>
        <div class="form-group">
            <label for="password">Temp Password</label>
            <input type="password" id="password" name="password" value="changeme123">
            <small class="form-help">User should change on first login</small>
        </div>
        <div class="form-row">
            <div class="form-group">
                <label for="role">Role</label>
                <select id="role" name="role">
                    <option value="developer">Developer</option>
                    <option value="orchestrator">Orchestrator</option>
                    <option value="admin">Admin</option>
                </select>
            </div>
            <div class="form-group">
                <label for="max_agents">Max Agents</label>
                <input type="number" id="max_agents" name="max_agents" value="10" min="1" max="20">
            </div>
        </div>
        
        <div class="form-actions">
            <a href="{{ url_for('users.list_users') }}" class="btn">Cancel</a>
            <button type="submit" class="btn btn-primary">Add Member</button>
        </div>
    </form>
</div>
{% endblock %}
